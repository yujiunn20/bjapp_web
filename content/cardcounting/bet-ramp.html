<body>
  <article>
    <h2>Bet Ramp</h2>
    <p class="lead">算牌最實際的價值，通常來自在 TC 高的時候加大下注。Bet ramp 就是把 true count 轉換成下注大小的規則。</p>

    <table class="data-table">
      <thead><tr><th>TC</th><th>下注單位</th><th>意義</th></tr></thead>
      <tbody>
        <tr><td>≤ 0</td><td>1</td><td>通常沒有優勢</td></tr>
        <tr><td>+1</td><td>2</td><td>開始有些微優勢</td></tr>
        <tr><td>+2</td><td>4</td><td>優勢更明顯</td></tr>
        <tr><td>+3</td><td>6</td><td>高牌密度偏強</td></tr>
        <tr><td>≥ +4</td><td>8</td><td>優勢強，但波動仍大</td></tr>
      </tbody>
    </table>

    <p>這只是教學示意。實際下注大小會強烈受到 bankroll、桌限、桌規、牌靴穿透率與風險承受度影響。</p>

    <h3>Kelly 直覺</h3>
    <p>Kelly 的核心是下注大小和 edge / variance 的關係。優勢越大可以下得更多，但波動大時仍然需要保守。</p>

    <div class="note">初學時先理解 bet ramp 的概念，不要把範例級距直接當成固定公式。</div>
  </article>
</body>
</html>
