    <h2>理想與現實</h2>
    <p class="lead">算牌在數學上可以建立優勢，但真實環境裡仍然有桌規、穿透率、桌限、速度、資金與心理壓力等限制。</p>

    <h3>幾個現實因素</h3>
    <ul>
      <li>穿透率越深，算牌通常越有價值；太早洗牌會降低可利用的資訊。</li>
      <li>桌規差會吃掉優勢，例如 6:5 blackjack 通常很不利。</li>
      <li>就算 edge 為正，短期仍可能連續輸很多手。</li>
      <li>賭場可能因為行為模式拒絕服務。</li>
    </ul>

    <p>因此這個網站和 App 更適合作為學習機率、策略與訓練反應的工具，而不是把算牌包裝成穩賺方法。</p>
  </article>
